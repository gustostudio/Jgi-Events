name: Update Webflow CMS Data

on:
  schedule:
    # Fallback only — primary trigger is the Webflow webhook via
    # netlify/functions/webflow-webhook.js (workflow_dispatch).
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      skip_wait:
        description: Skip the batching wait (for manual test runs)
        type: boolean
        default: false

# Queue runs so simultaneous webhook dispatches can't race each other's push.
concurrency:
  group: update-cms-data
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      # Batching window: edits made while this run sleeps are captured by the
      # fetch below. Later edits collapse into at most one queued run (see the
      # concurrency group above), so a burst of CMS edits yields ~1-2 runs.
      - name: Wait to batch CMS edits
        if: github.event_name == 'workflow_dispatch' && inputs.skip_wait != true
        run: sleep 240

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch Webflow CMS data
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
        run: node scripts/fetch-cms.js

      - name: Commit updated data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain public/data.json)" ]]; then
            git add public/data.json
            git commit -m "Update Webflow CMS data"
            git pull --rebase origin main
            git push
          else
            echo "No changes to public/data.json."
          fi
